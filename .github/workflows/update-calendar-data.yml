name: Update Calendar Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: write

jobs:
  build-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate calendar data
        run: node scripts/update-calendar-data.mjs

      - name: Commit refreshed calendar data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh motorsport agenda data"
          file_pattern: assets/data/calendar.json
