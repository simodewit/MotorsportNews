name: Update News Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  build-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate news data
        run: node scripts/update-news-data.mjs

      - name: Commit refreshed news data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh motorsport news feed"
          file_pattern: assets/data/news.json
