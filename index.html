<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Navigation Layout</title>
  <style>
    :root {
      color-scheme: dark;
      --nav-bg: #2b2b2b;
      --text: #f4f4f4;
      --text-muted: #d0d0d0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f7f7f7;
      color: #1f1f1f;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      height: 60px;
      padding: 0 24px;
      background: var(--nav-bg);
    }

    .logo {
      color: var(--text);
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      color: var(--text);
    }
  </style>
</head>
<body>
  <nav class="top-nav" aria-label="Main navigation">
    <a class="logo" href="#">Logo</a>

    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">News</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>
</body>
</html>
